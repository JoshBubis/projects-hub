<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects Hub</title>
  <style>
    :root { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    body { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .meta { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .card { background: #1e293b; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
    .ok { border-left: 4px solid #22c55e; }
    .bad { border-left: 4px solid #ef4444; }
    .name { font-weight: 600; }
    .detail { font-size: 0.85rem; color: #94a3b8; }
    a { color: #38bdf8; }
    .pill { padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
    .pill.ok { background: #14532d; color: #bbf7d0; }
    .pill.bad { background: #7f1d1d; color: #fecaca; }
    #error { color: #fca5a5; }
  </style>
</head>
<body>
  <h1>Projects Hub</h1>
  <p class="meta">Read-only health snapshot across production apps.</p>
  <p id="error"></p>
  <div id="apps"></div>
  <script>
    fetch('../data/status.json')
      .then(r => r.json())
      .then(data => {
        document.querySelector('.meta').textContent =
          `Last checked: ${new Date(data.checked_at).toLocaleString()} · Overall: ${data.overall_ok ? 'OK' : 'Issues'}`;
        const root = document.getElementById('apps');
        data.apps.forEach(app => {
          const el = document.createElement('div');
          el.className = 'card ' + (app.ok ? 'ok' : 'bad');
          el.innerHTML = `
            <div>
              <div class="name">${app.name}</div>
              <div class="detail">${app.summary || '—'} · ${app.latency_ms}ms · HTTP ${app.http_status ?? '—'}</div>
              <div class="detail"><a href="${app.admin_url}" target="_blank" rel="noopener">Admin</a></div>
            </div>
            <span class="pill ${app.ok ? 'ok' : 'bad'}">${app.ok ? 'UP' : 'DOWN'}</span>`;
          root.appendChild(el);
        });
      })
      .catch(err => {
        document.getElementById('error').textContent =
          'Could not load status.json — run: python poller/poll.py';
      });
  </script>
</body>
</html>
